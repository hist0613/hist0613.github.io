<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Seungtaek Choi - Publications</title>
  <meta name="description" content="Seungtaek Choi's publications">

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
    integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
    integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
    integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
    crossorigin="anonymous"></script>

  <link href="../css/github-light.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>

  <style>
    /* ── Overview section (below list) ─────────────────────────────────────── */
    .pub-overview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #ebebeb;
    }
    .overview-sec-title {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    /* Type legend below chart */
    .type-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #999;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Venue tags */
    .venue-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-content: flex-start;
    }
    .venue-tag {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-size: 12px;
      color: #555;
      background: #f5f5f5;
      border-radius: 3px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .venue-tag .vc {
      font-size: 11px;
      font-weight: 600;
      color: #4a90a4;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-links">
      <a href="../index.html" class="nav-link">About</a>
      <a href="../publications/" class="nav-link active">Publications</a>
      <a href="../teaching/" class="nav-link">Teaching</a>
    </div>
  </nav>

  <div class="content">
    <h3>Publications
      <span class="filter-btn journal   active" data-type="journal"   title="Toggle Journal">J</span>
      <span class="filter-btn conference active" data-type="conference" title="Toggle Conference">C</span>
      <span class="filter-btn workshop   active" data-type="workshop"   title="Toggle Workshop">W</span>
      <span class="filter-btn arxiv      active" data-type="arxiv"      title="Toggle ArXiv/Preprint">A</span>
      <span style="font-size:12px;font-weight:400;color:#aaa;margin-left:10px;">* equal contribution &nbsp; † corresponding author</span>
    </h3>

    <ul class="sparse-list" id="pub-list"></ul>

    <!-- Overview: chart + venue tags (secondary, below list) -->
    <div class="pub-overview">
      <!-- Left: Chart.js chart -->
      <div>
        <p class="overview-sec-title">Publications by Year <span id="total-label" style="color:#555;font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;"></span></p>
        <div style="position:relative;height:160px;"><canvas id="year-chart"></canvas></div>
        <div class="type-legend" id="type-legend"></div>
      </div>

      <!-- Right: venue tags -->
      <div>
        <p class="overview-sec-title">Venues — Journal &amp; Conference</p>
        <div class="venue-list" id="venue-tags"></div>
      </div>
    </div>
  </div>

  <script>
    const TYPE_COLOR_SOLID = {
      journal: '#558b5a', conference: '#4a90a4', workshop: '#c4873a', arxiv: '#b85450'
    };
const TYPE_ORDER  = ['conference', 'journal', 'workshop', 'arxiv'];
    const TYPE_LABELS = { conference: 'Conference', journal: 'Journal', workshop: 'Workshop', arxiv: 'Preprint' };

    // ── Render publication item ──────────────────────────────────────────────
    function renderAuthor(a) {
      let suffix = '';
      if (a.equal) suffix += '*';
      if (a.corresponding) suffix += '†';
      const sup = suffix ? `<sup>${suffix}</sup>` : '';
      return a.self ? `<u>${a.name}</u>${sup}` : `${a.name}${sup}`;
    }
    function renderVenueLine(pub) {
      let line = `${pub.venue} ${pub.year}`;
      if (pub.note) line += ` (${pub.note})`;
      if (pub.related && pub.related.length > 0)
        line += ` [${pub.related.map(r => `<a href="${r.url}">${r.text}</a>`).join(', ')}]`;
      return line;
    }
    function renderPub(pub) {
      return `<li class="pub-item ${pub.type}">
        <span class="pub-badge badge-${pub.type}">${pub.id}</span>
        <b>${pub.title}</b> [<a href="${pub.url}">PDF</a>]<br />
        ${pub.authors.map(renderAuthor).join(', ')}<br />
        ${renderVenueLine(pub)}
      </li>`;
    }

    // ── Chart.js: stacked bars + cumulative line ─────────────────────────────
    function buildYearChart(pubs) {
      const yearMap = {};
      pubs.forEach(p => {
        if (!yearMap[p.year]) yearMap[p.year] = { conference: 0, journal: 0, workshop: 0, arxiv: 0, total: 0 };
        yearMap[p.year][p.type]++;
        yearMap[p.year].total++;
      });

      const years = Object.keys(yearMap).sort();
      let cum = 0;
      const cums = years.map(y => { cum += yearMap[y].total; return cum; });
      const totalPubs = cum;

      document.getElementById('total-label').textContent =
        `— ${totalPubs} papers, ${years[0]}–${years[years.length - 1]}`;

      const TYPE_CHART_COLOR = {
        conference: 'rgba(74,144,164,0.65)',
        journal:    'rgba(85,139,90,0.65)',
        workshop:   'rgba(196,135,58,0.65)',
        arxiv:      'rgba(184,84,80,0.65)'
      };

      new Chart(document.getElementById('year-chart'), {
        data: {
          labels: years,
          datasets: [
            ...TYPE_ORDER.map(t => ({
              type: 'bar',
              label: TYPE_LABELS[t],
              data: years.map(y => yearMap[y][t]),
              backgroundColor: TYPE_CHART_COLOR[t],
              yAxisID: 'y',
              stack: 'stack'
            })),
            {
              type: 'line',
              label: 'Cumulative',
              data: cums,
              borderColor: 'rgba(80,80,80,0.7)',
              backgroundColor: 'transparent',
              pointBackgroundColor: 'rgba(80,80,80,0.7)',
              pointRadius: 3,
              borderWidth: 1.5,
              yAxisID: 'y1',
              tension: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 11 }, color: '#555' }
            },
            y: {
              stacked: true,
              position: 'left',
              title: { display: true, text: 'Papers per Year', font: { size: 11 }, color: '#777' },
              ticks: { font: { size: 11 }, color: '#555', stepSize: 2 },
              grid: { color: '#f0f0f0' }
            },
            y1: {
              position: 'right',
              title: { display: true, text: 'Cumulative Total', font: { size: 11 }, color: '#777' },
              ticks: { font: { size: 11 }, color: '#555' },
              grid: { drawOnChartArea: false }
            }
          }
        }
      });
    }

    // ── Type legend ──────────────────────────────────────────────────────────
    function buildTypeLegend(pubs) {
      const counts = { conference: 0, journal: 0, workshop: 0, arxiv: 0 };
      pubs.forEach(p => counts[p.type]++);
      document.getElementById('type-legend').innerHTML = TYPE_ORDER.map(t =>
        `<span class="legend-item">
          <span class="legend-dot" style="background:${TYPE_COLOR_SOLID[t]};"></span>
          ${counts[t]} ${TYPE_LABELS[t]}
        </span>`
      ).join('');
    }

    // ── Venue tags ───────────────────────────────────────────────────────────
    function buildVenueTags(pubs) {
      const vm = {};
      pubs.filter(p => p.type === 'conference' || p.type === 'journal')
          .forEach(p => { vm[p.venue] = (vm[p.venue] || 0) + 1; });
      document.getElementById('venue-tags').innerHTML = Object.entries(vm)
        .sort(([, a], [, b]) => b - a)
        .map(([v, c]) => `<span class="venue-tag">${v}<span class="vc">${c}</span></span>`)
        .join('');
    }

    // ── Filter ───────────────────────────────────────────────────────────────
    function applyFilters() {
      const active = $('.filter-btn.active').map(function () { return $(this).data('type'); }).get();
      $('.pub-item').each(function () {
        $(this).toggleClass('hidden', !active.some(t => $(this).hasClass(t)));
      });
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    document.getElementById('pub-list').innerHTML = PUBLICATIONS.map(renderPub).join('\n');
    buildYearChart(PUBLICATIONS);
    buildTypeLegend(PUBLICATIONS);
    buildVenueTags(PUBLICATIONS);
    $('.filter-btn').click(function () { $(this).toggleClass('active'); applyFilters(); });
  </script>
</body>

</html>
