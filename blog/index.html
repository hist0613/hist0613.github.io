<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    (function () {
      var lang = (navigator.language || 'en').toLowerCase();
      location.replace(lang.indexOf('ko') === 0 ? 'ko/' : 'en/');
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=en/">
</head>
<body><a href="en/">Continue</a></body>
</html>
